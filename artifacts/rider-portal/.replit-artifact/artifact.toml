kind = "web"
previewPath = "/rider/"
title = "Fittrac Rider"
version = "1.0.0"
id = "artifacts/rider-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/rider/" ]
localPort = 22112

[services.development]
run = "pnpm --filter @workspace/rider-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rider-portal", "run", "build" ]
publicDir = "artifacts/rider-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22112"
BASE_PATH = "/rider/"
